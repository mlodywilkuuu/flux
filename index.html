<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Flux | Zaloguj się</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center">

    <div class="bg-gray-800 p-8 rounded-2xl w-full max-w-sm border border-gray-700">
        <h1 class="text-4xl font-bold text-blue-500 mb-8 text-center">Flux</h1>
        <div class="space-y-4">
            <input type="email" placeholder="Email" class="w-full p-3 bg-gray-900 border border-gray-600 rounded-lg">
            <input type="password" placeholder="Hasło" class="w-full p-3 bg-gray-900 border border-gray-600 rounded-lg">
            <button onclick="handleLogin()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">Zaloguj się</button>
        </div>
    </div>

    <script>
        // Sprawdzenie sesji przy wejściu na stronę logowania
        if (localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }

        function handleLogin() {
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
