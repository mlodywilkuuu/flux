<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Flux | Platforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#313338] text-gray-200 h-screen overflow-hidden">

    <div id="login-view" class="h-screen flex flex-col items-center justify-center">
        <nav class="fixed top-6 w-[90%] max-w-5xl glass rounded-2xl px-6 py-4 flex justify-between items-center shadow-2xl z-50">
            <div class="text-2xl font-black italic">FLUX</div>
            <button class="px-5 py-2 bg-white text-black rounded-full text-xs font-bold">Logowanie</button>
        </nav>

        <div class="bg-[#2b2d31] p-8 rounded-2xl w-full max-w-sm border border-gray-700 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Witaj we Flux</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 bg-[#1e1f22] rounded-lg border border-black outline-none">
            <input type="password" id="pass" placeholder="Hasło" class="w-full p-3 mb-4 bg-[#1e1f22] rounded-lg border border-black outline-none">
            <button onclick="login()" class="w-full py-3 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition">Wejdź do Flux</button>
        </div>
    </div>

    <div id="app-view" class="hidden h-screen flex">
        <nav class="w-[72px] bg-[#1e1f22] flex flex-col items-center py-4 space-y-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-white">FX</div>
        </nav>
        <aside class="w-60 bg-[#2b2d31] flex flex-col p-4">
            <div class="font-bold text-white mb-6">Flux Główny</div>
            <div class="space-y-2 text-gray-400">
                <div class="hover:bg-[#3d3f45] p-2 rounded cursor-pointer"># ogólny</div>
            </div>
            <button onclick="logout()" class="mt-auto text-red-400 text-sm hover:underline">Wyloguj</button>
        </aside>
        <main class="flex-1 bg-[#313338] p-6">
            <h2 class="font-bold text-white text-xl">Witaj wewnątrz Flux</h2>
        </main>
    </div>

    <script>
        function login() {
            localStorage.setItem('isLoggedIn', 'true');
            showView();
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            showView();
        }

        function showView() {
            if (localStorage.getItem('isLoggedIn')) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
            } else {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
            }
        }
        // Inicjalizacja stanu
        showView();
    </script>
</body>
</html>
