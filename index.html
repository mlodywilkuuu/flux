<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux | Połącz się ze światem</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div id="root" class="flex h-screen">
        
        <nav class="w-64 border-r border-gray-800 p-6 flex flex-col">
            <h1 class="text-2xl font-bold text-blue-500 mb-10">FLUX</h1>
            <ul class="space-y-6 text-gray-300">
                <li class="hover:text-white cursor-pointer">Strona główna</li>
                <li class="hover:text-white cursor-pointer">Komunikator</li>
                <li class="hover:text-white cursor-pointer">Zespoły</li>
                <li class="hover:text-white cursor-pointer">Profil</li>
            </ul>
        </nav>

        <main class="flex-1 p-8 overflow-y-auto">
            <div class="max-w-2xl mx-auto">
                <h2 class="text-xl mb-6">Co u Ciebie słychać?</h2>
                <textarea class="w-full bg-gray-800 p-4 rounded-lg border border-gray-700" placeholder="Napisz coś..."></textarea>
                <button class="mt-2 bg-blue-600 px-6 py-2 rounded-lg font-bold">Opublikuj</button>
                
                </div>
        </main>

        <aside class="w-72 border-l border-gray-800 p-6">
            <h3 class="text-gray-400 font-semibold mb-4">Aktywni</h3>
            <div class="space-y-3">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span>Jan Kowalski</span>
                </div>
            </div>
        </aside>
    </div>

    <script src="dist/bundle.js"></script>
</body>
</html>
