<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Flux | Platforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { 
            background: linear-gradient(135deg, #0f172a, #1e293b, #312e81, #0f172a); 
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .flux-animation { animation: colorChange 4s infinite alternate; }
        @keyframes colorChange {
            0% { color: #3b82f6; }
            100% { color: #ffffff; }
        }
        .dropdown-menu { display: none; padding-top: 15px; }
        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body class="text-gray-200 h-screen overflow-hidden">

    <nav id="nav-island" class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-4xl glass rounded-full px-8 py-3 flex justify-between items-center shadow-2xl z-40">
        <div class="flex items-center gap-6">
            <div class="text-2xl font-black italic tracking-tighter flux-animation min-w-[80px]">FLUX</div>
            <button class="text-xs font-bold hover:text-white transition whitespace-nowrap">NASZA MISJA</button>
            <button class="text-xs font-bold hover:text-white transition whitespace-nowrap">BLOG</button>
            <div class="dropdown relative">
                <button class="text-xs font-bold hover:text-white transition whitespace-nowrap">POMOC ▾</button>
                <div class="dropdown-menu absolute top-0 left-0 pt-10">
                    <div class="glass rounded-xl p-2 w-48 shadow-2xl">
                        <button class="block w-full text-left text-xs p-3 hover:bg-white/10 rounded transition">FAQ</button>
                        <button class="block w-full text-left text-xs p-3 hover:bg-white/10 rounded transition">FEEDBACK</button>
                        <button class="block w-full text-left text-xs p-3 hover:bg-white/10 rounded transition">WYŚLIJ ZGŁOSZENIE</button>
                    </div>
                </div>
            </div>
        </div>
        
        <button onclick="toggleModal(true)" class="px-6 py-2 bg-white text-black rounded-full text-[11px] font-black hover:bg-gray-200 transition-all transform hover:scale-105 shadow-lg whitespace-nowrap uppercase">
            Zaloguj / Rejestracja
        </button>
    </nav>

    <div id="landing-page" class="h-screen flex flex-col items-center justify-center text-center px-4">
        <h1 class="text-5xl md:text-7xl font-black italic uppercase leading-tight mb-6">
            GRUPOWY CZAT,<br>KTÓRY TO CZYSTA<br>ZABAWA I GRA
        </h1>
        <p class="max-w-md text-gray-400">
            Flux jest świetny do grania w gry, chillowania ze znajomymi lub budowania światowej społeczności. Dostosuj swoją przestrzeń, aby rozmawiać, grać i spędzać czas.
        </p>
    </div>

    <div id="app-view" class="hidden h-screen flex">
        <aside class="w-60 bg-black/20 flex flex-col justify-between">
            <div class="p-4"><h2 class="font-bold text-white text-xl">FLUX</h2></div>
            <div class="bg-black/30 p-2 flex items-center gap-2 text-xs">
                <div class="relative">
                    <img src="https://ui-avatars.com/api/?name=W" class="w-9 h-9 rounded-full">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#1e293b]"></div>
                </div>
                <div class="flex-1 overflow-hidden">
                    <div class="font-bold text-white">WILKU</div>
                    <div class="text-gray-400 text-[10px]">Dostępny</div>
                </div>
                <div class="flex gap-2">
                    <button class="hover:bg-white/10 p-1.5 rounded transition">🎙️</button>
                    <button class="hover:bg-white/10 p-1.5 rounded transition">🎧</button>
                    <button class="hover:bg-white/10 p-1.5 rounded transition">⚙️</button>
                </div>
            </div>
        </aside>
        <main class="flex-1 p-6 flex flex-col items-center justify-center">
            <h2 id="welcome-text" class="font-bold text-white text-2xl">WITAJ WEWNĄTRZ FLUX</h2>
            <button onclick="logout()" class="mt-4 text-red-400 hover:underline">WYLOGUJ</button>
        </main>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-sm border border-white/10 shadow-2xl relative">
            <button onclick="toggleModal(false)" class="absolute top-6 right-6 text-gray-400 hover:text-white text-xl font-bold">&times;</button>
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-center uppercase">Logowanie</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 bg-black/30 rounded-xl border border-white/10 outline-none">
            <input type="password" id="pass" placeholder="Hasło" class="w-full p-3 mb-4 bg-black/30 rounded-xl border border-white/10 outline-none">
            <button onclick="login()" id="action-btn" class="w-full py-3 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 transition uppercase">Zaloguj</button>
            <p class="mt-4 text-center text-sm text-gray-400">
                <span id="switch-text">Nie masz konta?</span> 
                <button onclick="toggleAuthMode()" class="text-blue-400 hover:underline font-bold" id="switch-btn">Rejestracja</button>
            </p>
        </div>
    </div>

    <script>
        document.documentElement.lang = navigator.language || navigator.userLanguage;
        let isLogin = true;
        function toggleModal(show) { document.getElementById('login-modal').classList.toggle('hidden', !show); }
        
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('modal-title').innerText = isLogin ? 'Logowanie' : 'Rejestracja';
            document.getElementById('action-btn').innerText = isLogin ? 'Zaloguj' : 'Zarejestruj';
            document.getElementById('switch-text').innerText = isLogin ? 'Nie masz konta?' : 'Masz już konto?';
            document.getElementById('switch-btn').innerText = isLogin ? 'Rejestracja' : 'Zaloguj';
        }

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(email === 'admin@flux.pl' && pass === 'admin') {
                document.getElementById('welcome-text').innerText = 'WITAJ W PANELU ADMINA';
            } else {
                document.getElementById('welcome-text').innerText = 'WITAJ WEWNĄTRZ FLUX';
            }
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('nav-island').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            toggleModal(false);
        }

        function logout() {
            document.getElementById('landing-page').classList.remove('hidden');
            document.getElementById('nav-island').classList.remove('hidden');
            document.getElementById('app-view').classList.add('hidden');
        }
    </script>
</body>
</html>
