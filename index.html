<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Flux | Platforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: linear-gradient(135deg, #0f172a, #1e293b, #312e81, #0f172a); background-size: 400% 400%; animation: gradientMove 15s ease infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .flux-animation { animation: colorChange 4s infinite alternate; }
        @keyframes colorChange { 0% { color: #3b82f6; } 100% { color: #ffffff; } }
        .dropdown-menu { display: none; padding-top: 15px; }
        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body class="text-gray-200 h-screen overflow-hidden">

    <nav id="nav-island" class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-4xl glass rounded-full px-8 py-3 flex justify-between items-center shadow-2xl z-40">
        <div class="flex items-center gap-6">
            <div class="text-2xl font-black italic tracking-tighter flux-animation min-w-[80px]">FLUX</div>
            <button class="text-xs font-bold hover:text-white transition whitespace-nowrap">NASZA MISJA</button>
            <button class="text-xs font-bold hover:text-white transition whitespace-nowrap">BLOG</button>
            <div class="dropdown relative">
                <button class="text-xs font-bold hover:text-white transition whitespace-nowrap">POMOC ▾</button>
                <div class="dropdown-menu absolute top-0 left-0 pt-10">
                    <div class="glass rounded-xl p-2 w-48 shadow-2xl">
                        <button class="block w-full text-left text-xs p-3 hover:bg-white/10 rounded transition">FAQ</button>
                        <button class="block w-full text-left text-xs p-3 hover:bg-white/10 rounded transition">FEEDBACK</button>
                        <button class="block w-full text-left text-xs p-3 hover:bg-white/10 rounded transition">WYŚLIJ ZGŁOSZENIE</button>
                    </div>
                </div>
            </div>
        </div>
        <button onclick="toggleModal(true)" class="px-6 py-2 bg-white text-black rounded-full text-[11px] font-black hover:bg-gray-200 transition-all transform hover:scale-105 shadow-lg whitespace-nowrap uppercase">Zaloguj / Rejestracja</button>
    </nav>

    <div id="app-view" class="hidden h-screen flex">
        <aside class="w-60 bg-black/20 flex flex-col justify-between">
            <div class="p-4"><h2 class="font-bold text-white text-xl">FLUX</h2></div>
            <div class="bg-black/30 p-2 flex items-center gap-2 text-xs">
                <div class="relative"><img id="user-avatar" src="https://ui-avatars.com/api/?name=W" class="w-9 h-9 rounded-full"><div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#1e293b]"></div></div>
                <div class="flex-1 overflow-hidden"><div id="user-name" class="font-bold text-white">WILKU</div><div class="text-gray-400 text-[10px]">Dostępny</div></div>
                <div class="flex gap-2">
                    <button id="mic-btn" onclick="toggleMute('mic')" class="hover:bg-white/10 p-1.5 rounded transition">🎙️</button>
                    <button id="deaf-btn" onclick="toggleMute('deaf')" class="hover:bg-white/10 p-1.5 rounded transition">🎧</button>
                    <button onclick="toggleSettings(true)" class="hover:bg-white/10 p-1.5 rounded transition">⚙️</button>
                </div>
            </div>
        </aside>
        <main class="flex-1 p-6 flex flex-col items-center justify-center">
            <h2 id="welcome-text" class="font-bold text-white text-2xl">WITAJ WEWNĄTRZ FLUX</h2>
            <button onclick="logout()" class="mt-4 text-red-400 hover:underline">WYLOGUJ</button>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-md border border-white/10 shadow-2xl relative">
            <button onclick="toggleSettings(false)" class="absolute top-6 right-6 text-gray-400 hover:text-white text-xl">&times;</button>
            <h2 class="text-2xl font-bold mb-6">Ustawienia użytkownika</h2>
            <input type="text" id="new-name" placeholder="Nowa nazwa użytkownika" class="w-full p-3 mb-4 bg-black/30 rounded-xl border border-white/10 outline-none">
            <label class="block mb-2 text-xs text-gray-400">Zmień avatar (link do obrazka):</label>
            <input type="text" id="new-avatar" placeholder="URL obrazka" class="w-full p-3 mb-6 bg-black/30 rounded-xl border border-white/10 outline-none">
            <button onclick="saveProfile()" class="w-full py-3 bg-blue-600 rounded-xl font-bold">Zapisz zmiany</button>
        </div>
    </div>

    <script>
        // Logika wyciszania
        function toggleMute(type) {
            const btn = document.getElementById(type + '-btn');
            btn.classList.toggle('text-red-500');
            btn.style.opacity = btn.classList.contains('text-red-500') ? '0.5' : '1';
        }

        // Logika ustawień
        function toggleSettings(show) { document.getElementById('settings-modal').classList.toggle('hidden', !show); }
        
        function saveProfile() {
            const name = document.getElementById('new-name').value;
            const avatar = document.getElementById('new-avatar').value;
            if(name) document.getElementById('user-name').innerText = name;
            if(avatar) document.getElementById('user-avatar').src = avatar;
            toggleSettings(false);
        }

        // Reszta logiki (login/logout z poprzednich kroków...)
        function toggleModal(show) { document.getElementById('login-modal').classList.toggle('hidden', !show); }
        // (Pozostałe funkcje logowania/logout pozostają bez zmian)
    </script>
</body>
</html>
