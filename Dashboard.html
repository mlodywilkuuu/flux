<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Flux | Strona Główna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-nav { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#2c2f33] text-gray-100 min-h-screen">

    <nav class="fixed top-5 left-1/2 -translate-x-1/2 w-[95%] max-w-5xl z-50 glass-nav border border-white/10 rounded-2xl p-4 flex justify-between items-center shadow-2xl">
        <div class="text-2xl font-black text-white italic">FLUX</div>
        <div class="flex gap-6 text-sm font-semibold text-gray-300">
            <a href="#" class="hover:text-white transition">Platforma</a>
            <a href="#" class="hover:text-white transition">Zespoły</a>
            <a href="#" class="hover:text-white transition">Społeczność</a>
        </div>
        <button onclick="window.location.href='index.html'" 
                class="px-6 py-2 bg-white text-black rounded-full text-sm font-bold hover:bg-gray-200 transition">
            Logowanie
        </button>
    </nav>

    <div class="pt-32 px-6 flex flex-col items-center text-center">
        <h1 class="text-6xl font-extrabold mb-6">Twoje miejsce na <br><span class="text-blue-500">przepływ informacji</span>.</h1>
        <p class="text-xl text-gray-400 max-w-2xl mb-10">Flux łączy najlepsze cechy komunikacji w czasie rzeczywistym z przejrzystym strumieniem społecznościowym.</p>
        
        <div class="bg-gray-800 p-8 rounded-3xl w-full max-w-md shadow-2xl border border-gray-700">
            <h2 class="text-xl font-bold mb-6">Zarejestruj się w Flux</h2>
            <div class="space-y-4">
                <input type="text" placeholder="Email" class="w-full p-4 rounded-lg bg-[#202225] border border-black outline-none focus:border-blue-500">
                <input type="password" placeholder="Hasło" class="w-full p-4 rounded-lg bg-[#202225] border border-black outline-none focus:border-blue-500">
                <button class="w-full py-4 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition">Rozpocznij</button>
            </div>
        </div>
    </div>

</body>
</html>
