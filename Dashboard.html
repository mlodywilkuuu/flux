<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux | Zaloguj się</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efekt szkła */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#1e1f22] text-white font-sans min-h-screen">

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-5xl z-50 glass rounded-2xl px-6 py-4 flex justify-between items-center shadow-2xl">
        <div class="text-2xl font-black tracking-tighter italic">FLUX</div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-white transition">Platforma</a>
            <a href="#" class="hover:text-white transition">Zespoły</a>
            <a href="#" class="hover:text-white transition">Społeczność</a>
        </div>
        <button onclick="document.getElementById('login-modal').classList.remove('hidden')" 
                class="px-5 py-2 bg-white text-black rounded-full text-xs font-bold hover:bg-gray-200 transition">
            Zaloguj / Rejestracja
        </button>
    </nav>

    <main class="pt-40 flex flex-col items-center justify-center text-center px-4">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">Przepływ Twoich <br> <span class="text-blue-500">zespołów i znajomych</span></h1>
        <p class="text-lg text-gray-400 max-w-xl mb-10">Flux to nowoczesna przestrzeń łącząca pracę w Teams z dynamiką społeczności.</p>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-[#2b2d31] p-8 rounded-2xl w-full max-w-sm shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-center">Witaj we Flux</h2>
            <div class="space-y-4">
                <input type="email" placeholder="Email" class="w-full p-3 bg-[#1e1f22] rounded-lg border border-black focus:border-blue-500 outline-none">
                <input type="password" placeholder="Hasło" class="w-full p-3 bg-[#1e1f22] rounded-lg border border-black focus:border-blue-500 outline-none">
                <button onclick="handleLogin()" class="w-full py-3 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition">Wejdź do Flux</button>
                <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="w-full py-2 text-gray-400 text-sm hover:underline">Zamknij</button>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            // Symulacja logowania
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html'; // Przekierowanie do pliku index.html
        }
    </script>
</body>
</html>
